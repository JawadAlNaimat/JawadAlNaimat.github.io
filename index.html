<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jawad AL-Naimat | Senior Mobile Developer</title>
    <style>
        /* --- High-End Modern Design System --- */
        :root {
            --bg-dark: #030712;
            --bg-gradient: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #0f172a 45%, #030712 100%);
            --card-bg: rgba(15, 23, 42, 0.45);
            --card-hover-bg: rgba(30, 41, 59, 0.6);
            --card-border: rgba(255, 255, 255, 0.05);
            --card-border-hover: rgba(6, 182, 212, 0.3);
            
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            
            --neon-cyan: #06b6d4;
            --neon-blue: #3b82f6;
            --neon-purple: #a855f7;
            
            --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-dark);
            background-image: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-primary);
            line-height: 1.7;
            padding: 60px 20px;
            overflow-x: hidden;
            letter-spacing: -0.01em;
        }

        /* Ambient Dynamic Background Blurs */
        body::before, body::after {
            content: '';
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: rgba(6, 182, 212, 0.08);
            filter: blur(120px);
            z-index: -1;
            pointer-events: none;
        }
        body::before { top: -10%; right: -5%; background: rgba(168, 85, 247, 0.06); }
        body::after { bottom: 10%; left: -10%; }

        .container {
            max-width: 940px;
            margin: 0 auto;
        }

        /* --- Premium Container Card Architecture --- */
        header, section {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 48px;
            margin-bottom: 32px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
            transition: var(--transition-smooth);
        }

        header:hover, section:hover {
            border-color: rgba(255, 255, 255, 0.09);
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.4);
        }

        /* --- Creative Header Area --- */
        header {
            text-align: center;
            position: relative;
            padding: 64px 48px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #ffffff 30%, #93c5fd 70%, #22d3ee 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.35rem;
            background: linear-gradient(to right, var(--neon-cyan), var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            font-size: 1.05rem;
        }

        .tagline {
            color: var(--text-secondary);
            max-width: 680px;
            margin: 0 auto 32px auto;
            font-size: 1.1rem;
        }

        /* --- Sleek Pill Action Controls --- */
        .links-meta {
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .btn {
            text-decoration: none;
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.03);
            padding: 12px 26px;
            border-radius: 100px;
            border: 1px solid var(--card-border);
            font-size: 0.95rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition-smooth);
        }

        .btn:hover {
            background: #fff;
            color: #030712;
            border-color: #fff;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px -5px rgba(255, 255, 255, 0.2);
        }

        h2 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 16px;
        }

        /* --- Tech Stack Badge Grid --- */
        .badge-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;
        }

        .badge {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
            border: 1px solid var(--card-border);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 0.88rem;
            font-weight: 500;
            transition: var(--transition-smooth);
        }

        .badge:hover {
            background: rgba(59, 130, 246, 0.08);
            border-color: rgba(59, 130, 246, 0.3);
            color: #93c5fd;
            transform: translateY(-1px);
        }

        .badge.vibe {
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.15) 0%, rgba(168, 85, 247, 0.15) 100%);
            color: #22d3ee;
            border: 1px solid rgba(6, 182, 212, 0.3);
            font-weight: 600;
        }
        
        .badge.vibe:hover {
            border-color: rgba(168, 85, 247, 0.6);
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.2);
        }

        /* --- Premium Grid Showcase Deck --- */
        .project-card {
            background: rgba(3, 7, 18, 0.3);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 32px;
            margin-bottom: 24px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 32px;
            transition: var(--transition-smooth);
        }

        .project-card:hover {
            background: var(--card-hover-bg);
            border-color: var(--card-border-hover);
            transform: translateY(-4px) scale(1.01);
            box-shadow: 0 20px 40px -20px rgba(6, 182, 212, 0.15);
        }

        @media (min-width: 768px) {
            .project-card {
                grid-template-columns: 1.25fr 0.75fr;
                align-items: center;
            }
        }

            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 10px;
